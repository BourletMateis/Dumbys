services:
  app:
    image: ghcr.io/bourletmateis/dumbys:latest
    ports:
      - "8082:8081"
      - "19000:19000"
      - "19001:19001"
      - "19002:19002"
    env_file:
      - .env
    environment:
      - REACT_NATIVE_PACKAGER_HOSTNAME=${HOST_IP:-localhost}
      - EXPO_NO_TYPESCRIPT_VALIDATION=1
      - EXPO_NO_TELEMETRY=1
    network_mode: "host"
    restart: unless-stopped
    volumes:
      - discord_data:/data
    labels:
      - "com.centurylinklabs.watchtower.enable=true"

volumes:
  discord_data:
