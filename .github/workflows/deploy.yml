name: EAS Update & Notify Discord

on:
  push:
    branches: ["prod"]

jobs:
  update:
    runs-on: ubuntu-latest
    environment: EXPO_TOKEN

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Setup EAS
        uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - name: Create preview channel if needed
        run: eas channel:create preview --non-interactive || true

      - name: Publish EAS Update
        run: eas update --branch preview --message "${{ github.event.head_commit.message }}" --non-interactive
        env:
          EXPO_PUBLIC_SUPABASE_URL: ${{ secrets.EXPO_PUBLIC_SUPABASE_URL }}
          EXPO_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.EXPO_PUBLIC_SUPABASE_ANON_KEY }}
          EXPO_PUBLIC_STORAGE_WORKER_URL: ${{ secrets.EXPO_PUBLIC_STORAGE_WORKER_URL }}
          EXPO_PUBLIC_STORAGE_AUTH_SECRET: ${{ secrets.EXPO_PUBLIC_STORAGE_AUTH_SECRET }}

      - name: Send QR to Discord
        run: |
          PROJECT_ID="8f4455fe-b529-4991-872c-dd480fea101e"
          URL="exp://u.expo.dev/${PROJECT_ID}?channel-name=preview"
          ENCODED=$(python3 -c "import urllib.parse; print(urllib.parse.quote('${URL}'))")
          QR_URL="https://api.qrserver.com/v1/create-qr-code/?size=300x300&data=${ENCODED}"
          COMMIT_MSG="${{ github.event.head_commit.message }}"
          SHORT_SHA="${{ github.sha }}"
          SHORT_SHA="${SHORT_SHA:0:7}"
          PAYLOAD=$(jq -n \
            --arg title "📱 DumbAward — Nouvelle update!" \
            --arg desc "**Commit:** [\`${SHORT_SHA}\`](https://github.com/${{ github.repository }}/commit/${{ github.sha }}) — ${COMMIT_MSG}\n\nScanne le QR avec **Expo Go** :" \
            --arg qr "$QR_URL" \
            --arg url "$URL" \
            --arg ts "$(date -u +%Y-%m-%dT%H:%M:%SZ)" \
            '{embeds:[{title:$title,description:$desc,color:4177791,image:{url:$qr},fields:[{name:"URL",value:"`\($url)`"}],footer:{text:"DumbAward CI/CD"},timestamp:$ts}]}')
          curl -H "Content-Type: application/json" -d "$PAYLOAD" "${{ secrets.DISCORD_WEBHOOK_URL }}"
